<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; background: #fafaf9; color: #1c1917; -webkit-font-smoothing: antialiased; }
.app { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

/* Header */
.header { display: flex; flex-direction: column; gap: .85rem; margin-bottom: 2rem; }
.header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
.nav { display: flex; gap: .25rem; flex-wrap: wrap; }
.nav-btn { padding: .5rem .85rem; border: none; background: transparent; color: #78716c; font-size: .87rem; font-weight: 500; cursor: pointer; border-radius: .5rem; transition: all .15s; }
.nav-btn:hover { background: #f5f5f4; color: #1c1917; }
.nav-btn.active { background: #1c1917; color: #fff; }

/* Common */
.section-title { margin: 0 0 .75rem; font-size: 1.05rem; font-weight: 600; }
.hint { color: #78716c; font-size: .85rem; margin: 0 0 1.25rem; }
.state-msg { padding: 2rem; text-align: center; color: #78716c; }
.state-msg.error { color: #b91c1c; background: #fef2f2; border-radius: .5rem; }

/* Color dots (single source of color) */
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-red { background: #ef4444; }
.dot-orange { background: #f97316; }
.dot-yellow { background: #eab308; }
.dot-green { background: #22c55e; }
.dot-blue { background: #3b82f6; }
.dot-purple { background: #a855f7; }
.dot-pink { background: #ec4899; }
.dot-gray { background: #a8a29e; }

/* === Home (minimal redesign) === */
.home { display: flex; flex-direction: column; gap: 2rem; }
.home-today-date { margin: 0 0 .85rem; font-size: .82rem; font-weight: 500; color: #78716c; letter-spacing: .02em; }
.home-today-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
.t-card { position: relative; padding: 1.25rem; border-radius: .85rem; background: #fff; border: 1px solid #e7e5e4; transition: all .15s; }
.t-card.is-done { background: #f5f5f4; }
.t-card-empty { background: #fafaf9; border-style: dashed; border-color: #d6d3d1; }
.t-card-label { font-size: .78rem; font-weight: 500; color: #78716c; margin-bottom: .85rem; letter-spacing: .02em; }
.t-card-time { font-size: 2rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1; color: #1c1917; }
.t-card.is-done .t-card-time { color: #a8a29e; text-decoration: line-through; }
.t-card-name { display: flex; align-items: center; gap: .45rem; margin-top: .55rem; font-size: .92rem; font-weight: 500; color: #1c1917; }
.t-card-memo { margin: .85rem 0 0; font-size: .82rem; color: #57534e; line-height: 1.45; }
.t-card-empty-msg { font-size: 1.1rem; font-weight: 600; color: #a8a29e; margin-top: .25rem; }
.t-card-pickup { margin-top: 1rem; width: 100%; padding: .55rem; background: #1c1917; color: #fff; border: none; border-radius: .45rem; font-size: .82rem; font-weight: 500; cursor: pointer; transition: background .15s; }
.t-card-pickup:hover { background: #292524; }
.t-card-done { display: inline-block; margin-top: 1rem; font-size: .8rem; color: #16a34a; font-weight: 500; }

.home-week-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .35rem; }
.home-week-title { margin: 0; font-size: .95rem; font-weight: 600; }
.home-week-badge { padding: .2rem .6rem; background: #fef3c7; color: #a16207; border-radius: 999px; font-size: .73rem; font-weight: 500; }
.home-week-list { display: flex; flex-direction: column; }
.home-week-row { display: grid; grid-template-columns: 56px 1fr 1fr; gap: .85rem; align-items: center; padding: .9rem .25rem; border-bottom: 1px solid #f5f5f4; }
.home-week-row:last-child { border-bottom: none; }
.home-week-row.is-today { background: #fef9c3; margin: 0 -.75rem; padding: .9rem 1rem; border-radius: .5rem; border-bottom-color: transparent; }
.home-week-day { font-size: .9rem; font-weight: 600; color: #1c1917; }
.home-week-day small { display: block; font-size: .72rem; color: #a8a29e; font-weight: 400; margin-top: 2px; }
.w-item { display: flex; align-items: center; gap: .45rem; font-size: .85rem; }
.w-item-time { color: #57534e; font-variant-numeric: tabular-nums; min-width: 38px; }
.w-item-name { color: #1c1917; }
.w-item-empty { color: #d6d3d1; font-size: .85rem; }

/* Calendar */
.calendar { display: flex; flex-direction: column; gap: 4px; background: #e7e5e4; padding: 4px; border-radius: .5rem; }
.cal-row { display: grid; grid-template-columns: 70px repeat(5, 1fr); gap: 4px; }
.cal-cell { background: #fff; padding: .75rem .5rem; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: .85rem; border-radius: .375rem; }
.cal-header { background: transparent; min-height: 40px; }
.cal-day-header { background: #f5f5f4; font-weight: 600; }
.cal-day-header.today { background: #1c1917; color: #fff; }
.cal-day-header small { font-size: .72rem; color: inherit; opacity: .8; margin-top: 2px; }
.cal-side { background: #f5f5f4; font-weight: 600; color: #78716c; }
.cal-empty { background: #fafaf9; border: 1px dashed #d6d3d1; color: #a8a29e; cursor: pointer; transition: all .15s; font-size: 1rem; }
.cal-empty:hover { background: #fef9c3; border-color: #1c1917; color: #1c1917; }
.cal-filled { cursor: pointer; border: 1px solid #e7e5e4; background: #fff; transition: all .15s; }
.cal-filled:hover { transform: translateY(-1px); border-color: #1c1917; }
.cal-filled.is-done { opacity: .55; }
.cal-time { font-weight: 700; font-size: .95rem; display: flex; align-items: center; gap: .3rem; }
.cal-name { font-size: .78rem; color: #57534e; margin-top: 2px; }

/* Caregivers */
.cg-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .75rem; }
.cg-card { display: flex; align-items: center; gap: .75rem; padding: 1rem; background: #fff; border: 1px solid #e7e5e4; border-radius: .6rem; }
.cg-card .dot { width: 12px; height: 12px; }
.cg-name { font-weight: 600; font-size: .95rem; }
.cg-role { font-size: .8rem; color: #78716c; margin-top: .15rem; }

/* Notices */
.notice-form { display: flex; flex-direction: column; gap: .55rem; margin-bottom: 1.5rem; }
.notice-form textarea { padding: .75rem; border: 1px solid #d6d3d1; border-radius: .5rem; font-size: .9rem; font-family: inherit; resize: vertical; }
.notice-form textarea:focus { outline: none; border-color: #1c1917; }
.notice-form button { align-self: flex-end; }
.notice-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: .5rem; }
.notice-item { padding: .9rem 1rem; background: #fff; border: 1px solid #e7e5e4; border-radius: .5rem; }
.notice-item p { margin: 0 0 .35rem; font-size: .9rem; line-height: 1.5; }
.notice-item small { font-size: .75rem; color: #a8a29e; }
.notice-empty { padding: 2rem; text-align: center; color: #a8a29e; font-size: .9rem; }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(28, 25, 23, .5); display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 100; }
.modal { background: #fff; width: 100%; max-width: 440px; border-radius: .75rem; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; border-bottom: 1px solid #e7e5e4; }
.modal-header h3 { margin: 0; font-size: 1.05rem; }
.modal-close { border: none; background: transparent; font-size: 1.1rem; cursor: pointer; color: #78716c; padding: .25rem .5rem; }
.modal-close:hover { color: #1c1917; }
.modal-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
.form-row { display: flex; flex-direction: column; gap: .375rem; border: none; padding: 0; margin: 0; }
.form-row > span, .form-row > legend { font-size: .85rem; font-weight: 500; color: #57534e; padding: 0; }
.form-row input, .form-row select, .form-row textarea { padding: .5rem .75rem; border: 1px solid #d6d3d1; border-radius: .375rem; font-size: .9rem; font-family: inherit; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: #1c1917; box-shadow: 0 0 0 3px rgba(28,25,23,.1); }
.radio-group { display: flex; gap: 1rem; }
.radio-group label { display: flex; align-items: center; gap: .375rem; font-size: .9rem; cursor: pointer; }
.modal-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: .5rem; }
.btn { padding: .5rem 1rem; border: none; border-radius: .375rem; font-size: .9rem; font-weight: 500; cursor: pointer; }
.btn-primary { background: #1c1917; color: #fff; }
.btn-primary:hover { background: #292524; }
.btn-secondary { background: #f5f5f4; color: #57534e; }
.btn-secondary:hover { background: #e7e5e4; }

/* Mobile */
@media (max-width: 640px) {
	.home-today-grid { grid-template-columns: 1fr; }
	.cal-row { grid-template-columns: 50px repeat(5, 1fr); }
	.cal-cell { padding: .5rem .25rem; min-height: 60px; font-size: .75rem; }
	.home-week-row { grid-template-columns: 48px 1fr 1fr; gap: .5rem; }
}
</style>

atus === '완료' || !s.date || !s.time) return;\n      const dt = new Date(`${s.date}T${s.time}:00`);\n      if (Number.isNaN(dt.getTime())) return;\n      const notifyAt = dt.getTime() - 30 * 60 * 1000;\n      const delay = notifyAt - Date.now();\n      if (delay > 0 && delay < 24 * 60 * 60 * 1000) {\n        const cg = caregivers.find(c => c.id === s.caregiverId);\n        const id = setTimeout(() => {\n          new Notification(`${s.type} 30분 전 알림`, {\n            body: `${s.time} · ${cg?.name ?? '미지정'}${s.memo ? ` · ${s.memo}` : ''}`,\n          });\n        }, delay);\n        timers.push(id);\n      }\n    });\n    return () => timers.forEach(clearTimeout);\n  }, [schedules, caregivers]);\n\n  const weekDates = useMemo(() => getWeekDates(todayStr), []);\n  const getCaregiver = useCallback(\n    (id) => caregivers.find(c => c.id === id) || { name: '미지정', color: 'gray', role: '' },\n    [caregivers]\n  );\n\n  // 일정 등록 — Optimistic UI + Notion POST\n  const handleSave = async (newSched) => {\n    const tempId = 'local-' + Date.now();\n    setSchedules(prev => [...prev, { ...newSched, id: tempId }]);\n    setModal(null);\n    const data = await notionPost('/api/notion/pages', {\n      parent: { database_id: extractDbId(SCHEDULE_DB_ID) },\n      properties: {\n        '이름': { title: [{ text: { content: `${newSched.date} ${newSched.type}` } }] },\n        '날짜': { date: { start: newSched.date } },\n        '구분': { select: { name: newSched.type } },\n        '시간': { rich_text: [{ text: { content: newSched.time } }] },\n        '담당자': { relation: [{ id: newSched.caregiverId }] },\n        '상태': { status: { name: newSched.status || '예정' } },\n        '메모': { rich_text: [{ text: { content: newSched.memo || '' } }] },\n      },\n    });\n    if (data?.id) {\n      setSchedules(prev => prev.map(s => (s.id === tempId ? { ...s, id: data.id } : s)));\n    }\n  };\n\n  // 픽업 완료 — Log DB 기록 + Schedule 상태 \"완료\"\n  const handlePickup = async (schedule) => {\n    setSchedules(prev =>\n      prev.map(s => (s.id === schedule.id ? { ...s, status: '완료' } : s))\n    );\n    const cg = getCaregiver(schedule.caregiverId);\n    await notionPost('/api/notion/pages', {\n      parent: { database_id: extractDbId(LOG_DB_ID) },\n      properties: {\n        '이름': { title: [{ text: { content: `${schedule.date} ${schedule.type} 완료` } }] },\n        '일시': { date: { start: new Date().toISOString() } },\n        '구분': { select: { name: schedule.type } },\n        '담당자': { rich_text: [{ text: { content: cg.name } }] },\n      },\n    });\n    const isLocalId = String(schedule.id).startsWith('local-') || String(schedule.id).startsWith('s');\n    if (!isLocalId) {\n      await notionPatch(`/api/notion/pages/${schedule.id}`, {\n        properties: { '상태': { status: { name: '완료' } } },\n      });\n    }\n  };\n\n  // 공지 등록 — Optimistic UI + Notices DB POST\n  const handleAddNotice = async (text) => {\n    const tempId = 'local-' + Date.now();\n    const now = new Date().toISOString().slice(0, 16).replace('T', ' ');\n    setNotices(prev => [{ id: tempId, text, createdAt: now }, ...prev]);\n    const data = await notionPost('/api/notion/pages', {\n      parent: { database_id: extractDbId(NOTICES_DB_ID) },\n      properties: {\n        '제목': { title: [{ text: { content: text.slice(0, 40) } }] },\n        '내용': { rich_text: [{ text: { content: text } }] },\n      },\n    });\n    if (data?.id) {\n      setNotices(prev => prev.map(n => (n.id === tempId ? { ...n, id: data.id } : n)));\n    }\n  };\n\n  return (\n    <div className=\"app\">\n      <Header view={view} onChange={setView} />\n      {loading && <div className=\"state-msg\">불러오는 중...</div>}\n      {error && <div className=\"state-msg error\">⚠️ {error} (Fallback 데이터로 표시 중)</div>}\n      {!loading && view === 'home' && (\n        <HomeView\n          schedules={schedules}\n          weekDates={weekDates}\n          getCaregiver={getCaregiver}\n          onPickup={handlePickup}\n        />\n      )}\n      {!loading && view === 'calendar' && (\n        <CalendarView\n          schedules={schedules}\n          weekDates={weekDates}\n          getCaregiver={getCaregiver}\n          onAddClick={(date, type) => setModal({ date, type, schedule: null })}\n          onScheduleClick={(s) => setModal({ schedule: s, date: s.date, type: s.type })}\n        />\n      )}\n      {!loading && view === 'caregivers' && (\n        <CaregiversView caregivers={caregivers} />\n      )}\n      {!loading && view === 'notices' && (\n        <NoticesView notices={notices} onAdd={handleAddNotice} />\n      )}\n      {modal && (\n        <ScheduleModal\n          initial={modal}\n          caregivers={caregivers}\n          onClose={() => setModal(null)}\n          onSave={handleSave}\n        />\n      )}\n    </div>\n  );\n}\n\n// === Header ===\nfunction Header({ view, onChange }) {\n  const tabs = [\n    { id: 'home', label: '홈' },\n    { id: 'calendar', label: '캘린더' },\n    { id: 'caregivers', label: '담당자' },\n    { id: 'notices', label: '공지' },\n  ];\n  return (\n    <header className=\"header\">\n      <h1>등하원 모아 👶</h1>\n      <nav className=\"nav\">\n        {tabs.map(t => (\n          <button\n            key={t.id}\n            className={view === t.id ? 'nav-btn active' : 'nav-btn'}\n            onClick={() => onChange(t.id)}\n          >\n            {t.label}\n          </button>\n        ))}\n      </nav>\n    </header>\n  );\n}\n\n// === HomeView (미니멀 리디자인) ===\nfunction HomeView({ schedules, weekDates, getCaregiver, onPickup }) {\n  const todaySchedules = schedules.filter(s => s.date === todayStr);\n  const morning = todaySchedules.find(s => s.type === '등원');\n  const evening = todaySchedules.find(s => s.type === '하원');\n  const dayNames = ['월','화','수','목','금'];\n\n  const unassigned = weekDates.reduce((acc, d) => {\n    const ds = schedules.filter(s => s.date === d);\n    return (\n      acc +\n      (ds.find(s => s.type === '등원') ? 0 : 1) +\n      (ds.find(s => s.type === '하원') ? 0 : 1)\n    );\n  }, 0);\n\n  return (\n    <main className=\"home\">\n      <section>\n        <p className=\"home-today-date\">{formatTodayLabel()}</p>\n        <div className=\"home-today-grid\">\n          <TodayCard label=\"등원\" icon=\"🌅\" schedule={morning} getCaregiver={getCaregiver} onPickup={onPickup} />\n          <TodayCard label=\"하원\" icon=\"🌆\" schedule={evening} getCaregiver={getCaregiver} onPickup={onPickup} />\n        </div>\n      </section>\n\n      <section>\n        <div className=\"home-week-head\">\n          <h2 className=\"home-week-title\">이번 주</h2>\n          {unassigned > 0 && <span className=\"home-week-badge\">미배정 {unassigned}</span>}\n        </div>\n        <div className=\"home-week-list\">\n          {weekDates.map((d, i) => {\n            const ds = schedules.filter(s => s.date === d);\n            const morn = ds.find(s => s.type === '등원');\n            const eve = ds.find(s => s.type === '하원');\n            return (\n              <div key={d} className={d === todayStr ? 'home-week-row is-today' : 'home-week-row'}>\n                <div className=\"home-week-day\">\n                  {dayNames[i]}\n                  <small>{d.slice(8)}</small>\n                </div>\n                <WeekItem schedule={morn} getCaregiver={getCaregiver} />\n                <WeekItem schedule={eve} getCaregiver={getCaregiver} />\n              </div>\n            );\n          })}\n        </div>\n      </section>\n    </main>\n  );\n}\n\nfunction TodayCard({ label, icon, schedule, getCaregiver, onPickup }) {\n  if (!schedule) {\n    return (\n      <div className=\"t-card t-card-empty\">\n        <div className=\"t-card-label\">{icon} {label}</div>\n        <div className=\"t-card-empty-msg\">미배정</div>\n      </div>\n    );\n  }\n  const cg = getCaregiver(schedule.caregiverId);\n  const done = schedule.status === '완료';\n  return (\n    <div className={done ? 't-card is-done' : 't-card'}>\n      <div className=\"t-card-label\">{icon} {label}</div>
