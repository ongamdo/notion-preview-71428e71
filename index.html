<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; background: #f8fafc; color: #0f172a; }
.app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

/* Header */
.header { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
.header h1 { margin: 0; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
.nav { display: flex; gap: .5rem; flex-wrap: wrap; border-bottom: 1px solid #e2e8f0; padding-bottom: .5rem; }
.nav-btn { padding: .5rem 1rem; border: none; background: transparent; color: #64748b; font-size: .9rem; font-weight: 500; cursor: pointer; border-radius: .5rem; transition: all .15s; }
.nav-btn:hover { background: #f1f5f9; color: #0f172a; }
.nav-btn.active { background: #6366f1; color: #fff; }

/* Common */
.section-title { margin: 0 0 .75rem; font-size: 1.1rem; font-weight: 600; }
.hint { color: #64748b; font-size: .85rem; margin: 0 0 1rem; }
.state-msg { padding: 2rem; text-align: center; color: #64748b; }
.state-msg.error { color: #b91c1c; background: #fef2f2; border-radius: .5rem; }
.alert { padding: .75rem 1rem; background: #fef3c7; border-left: 3px solid #f59e0b; border-radius: .375rem; margin-bottom: 1.5rem; font-size: .9rem; }

/* Today section */
.today-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
.today-card { padding: 1.25rem; border-radius: .75rem; background: #fff; border: 2px solid #e2e8f0; transition: transform .15s; }
.today-card.empty { background: #fafafa; border-style: dashed; color: #94a3b8; }
.today-card-label { font-size: .85rem; font-weight: 600; color: #64748b; margin-bottom: .5rem; }
.today-card-time { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; }
.today-card-name { font-size: 1rem; font-weight: 500; margin-top: .25rem; }
.today-card-name small { color: #94a3b8; font-weight: 400; }
.today-card-memo { margin-top: .75rem; padding: .5rem; background: #f8fafc; border-radius: .375rem; font-size: .85rem; color: #475569; }
.today-card-empty-msg { font-size: 1.25rem; font-weight: 600; color: #f59e0b; }
.today-card-hint { font-size: .8rem; color: #94a3b8; margin-top: .5rem; }

/* Color borders for cards */
.color-red { border-color: #fca5a5; }
.color-orange { border-color: #fdba74; }
.color-yellow { border-color: #fde047; }
.color-green { border-color: #86efac; }
.color-blue { border-color: #93c5fd; }
.color-purple { border-color: #c4b5fd; }
.color-pink { border-color: #f9a8d4; }
.color-gray { border-color: #cbd5e1; }

/* Week preview */
.week-rows { display: flex; flex-direction: column; gap: .5rem; }
.week-row { display: grid; grid-template-columns: 80px 1fr; gap: 1rem; align-items: center; padding: .75rem 1rem; background: #fff; border-radius: .5rem; border: 1px solid #e2e8f0; }
.week-row.today { background: #eef2ff; border-color: #c7d2fe; }
.week-row-date { font-size: .9rem; color: #475569; }
.week-row-date strong { color: #0f172a; margin-right: .25rem; }
.week-row-items { display: flex; gap: .375rem; flex-wrap: wrap; }

/* Pills */
.pill { display: inline-block; padding: .25rem .625rem; border-radius: 999px; font-size: .8rem; font-weight: 500; background: #f1f5f9; color: #475569; border: 1px solid transparent; }
.pill-empty { background: #fafafa; color: #94a3b8; border-style: dashed; border-color: #cbd5e1; }
.pill-red { background: #fee2e2; color: #b91c1c; }
.pill-orange { background: #fed7aa; color: #c2410c; }
.pill-yellow { background: #fef3c7; color: #a16207; }
.pill-green { background: #dcfce7; color: #15803d; }
.pill-blue { background: #dbeafe; color: #1d4ed8; }
.pill-purple { background: #ede9fe; color: #6d28d9; }
.pill-pink { background: #fce7f3; color: #be185d; }
.pill-gray { background: #f1f5f9; color: #64748b; }

/* Calendar */
.calendar { display: flex; flex-direction: column; gap: 4px; background: #e2e8f0; padding: 4px; border-radius: .5rem; }
.cal-row { display: grid; grid-template-columns: 80px repeat(5, 1fr); gap: 4px; }
.cal-cell { background: #fff; padding: .75rem .5rem; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: .85rem; border-radius: .375rem; }
.cal-header { background: transparent; min-height: 40px; }
.cal-day-header { background: #f8fafc; font-weight: 600; }
.cal-day-header.today { background: #6366f1; color: #fff; }
.cal-day-header small { font-size: .75rem; color: inherit; opacity: .8; margin-top: 2px; }
.cal-side { background: #f1f5f9; font-weight: 600; color: #64748b; }
.cal-empty { background: #fafafa; border: 1px dashed #cbd5e1; color: #94a3b8; cursor: pointer; transition: all .15s; }
.cal-empty:hover { background: #eef2ff; border-color: #6366f1; color: #6366f1; }
.cal-filled { cursor: pointer; border: 2px solid; background: #fff; transition: transform .15s; }
.cal-filled:hover { transform: translateY(-2px); }
.cal-time { font-weight: 700; font-size: .95rem; }
.cal-name { font-size: .8rem; color: #475569; margin-top: 2px; }

/* Caregivers */
.cg-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
.cg-card { padding: 1rem; background: #fff; border: 2px solid #e2e8f0; border-radius: .5rem; }
.cg-name { font-weight: 600; font-size: 1rem; }
.cg-role { font-size: .85rem; color: #64748b; margin-top: .25rem; }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, .6); display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 100; }
.modal { background: #fff; width: 100%; max-width: 440px; border-radius: .75rem; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; border-bottom: 1px solid #e2e8f0; }
.modal-header h3 { margin: 0; font-size: 1.05rem; }
.modal-close { border: none; background: transparent; font-size: 1.1rem; cursor: pointer; color: #64748b; padding: .25rem .5rem; }
.modal-close:hover { color: #0f172a; }
.modal-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
.form-row { display: flex; flex-direction: column; gap: .375rem; border: none; padding: 0; margin: 0; }
.form-row > span, .form-row > legend { font-size: .85rem; font-weight: 500; color: #475569; padding: 0; }
.form-row input, .form-row select, .form-row textarea { padding: .5rem .75rem; border: 1px solid #cbd5e1; border-radius: .375rem; font-size: .9rem; font-family: inherit; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
.radio-group { display: flex; gap: 1rem; }
.radio-group label { display: flex; align-items: center; gap: .375rem; font-size: .9rem; cursor: pointer; }
.modal-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: .5rem; }
.btn { padding: .5rem 1rem; border: none; border-radius: .375rem; font-size: .9rem; font-weight: 500; cursor: pointer; }
.btn-primary { background: #6366f1; color: #fff; }
.btn-primary:hover { background: #4f46e5; }
.btn-secondary { background: #f1f5f9; color: #475569; }
.btn-secondary:hover { background: #e2e8f0; }

/* Mobile */
@media (max-width: 640px) {
	.today-grid { grid-template-columns: 1fr; }
	.cal-row { grid-template-columns: 60px repeat(5, 1fr); }
	.cal-cell { padding: .5rem .25rem; min-height: 60px; font-size: .75rem; }
}
</style>

egiver(s.caregiverId);\n              return (\n                <button\n                  key={d}\n                  className={`cal-cell cal-filled color-${cg.color}`}\n                  onClick={() => onScheduleClick(s)}\n                >\n                  <div className=\"cal-time\">{s.time}</div>\n                  <div className=\"cal-name\">{cg.name}</div>\n                </button>\n              );\n            })}\n          </div>\n        ))}\n      </div>\n    </main>\n  );\n}\n\n// === CaregiversView ===\nfunction CaregiversView({ caregivers }) {\n  if (caregivers.length === 0) {\n    return <div className=\"state-msg\">담당자가 없습니다</div>;\n  }\n  return (\n    <main className=\"content\">\n      <h2 className=\"section-title\">담당자 목록</h2>\n      <div className=\"cg-list\">\n        {caregivers.map(c => (\n          <div key={c.id} className={`cg-card color-${c.color}`}>\n            <div className=\"cg-name\">{c.name}</div>\n            <div className=\"cg-role\">{c.role}</div>\n          </div>\n        ))}\n      </div>\n    </main>\n  );\n}\n\n// === ScheduleModal ===\nfunction ScheduleModal({ initial, caregivers, onClose, onSave }) {\n  const isEdit = !!initial.schedule;\n  const defaultTime = initial.type === '하원' ? '17:00' : '08:30';\n  const [date, setDate] = useState(initial.date || todayStr);\n  const [type, setType] = useState(initial.type || '등원');\n  const [time, setTime] = useState(initial.schedule?.time || defaultTime);\n  const [caregiverId, setCaregiverId] = useState(initial.schedule?.caregiverId || caregivers[0]?.id || '');\n  const [memo, setMemo] = useState(initial.schedule?.memo || '');\n\n  const handleSubmit = (e) => {\n    e.preventDefault();\n    if (!date || !type || !time || !caregiverId) return;\n    onSave({ date, type, time, caregiverId, memo, status: '예정' });\n  };\n\n  return (\n    <div className=\"modal-backdrop\" onClick={onClose}>\n      <div className=\"modal\" onClick={e => e.stopPropagation()}>\n        <header className=\"modal-header\">\n          <h3>{isEdit ? '일정 수정' : '일정 등록'}</h3>\n          <button className=\"modal-close\" onClick={onClose}>✕</button>\n        </header>\n        <form className=\"modal-body\" onSubmit={handleSubmit}>\n          <label className=\"form-row\">\n            <span>날짜</span>\n            <input type=\"date\" value={date} onChange={e => setDate(e.target.value)} required />\n          </label>\n          <fieldset className=\"form-row\">\n            <legend>구분</legend>\n            <div className=\"radio-group\">\n              <label><input type=\"radio\" name=\"type\" value=\"등원\" checked={type === '등원'} onChange={e => setType(e.target.value)} /> 등원</label>\n              <label><input type=\"radio\" name=\"type\" value=\"하원\" checked={type === '하원'} onChange={e => setType(e.target.value)} /> 하원</label>\n            </div>\n          </fieldset>\n          <label className=\"form-row\">\n            <span>시간</span>\n            <input type=\"time\" value={time} onChange={e => setTime(e.target.value)} required />\n          </label>\n          <label className=\"form-row\">\n            <span>담당자</span>\n            <select value={caregiverId} onChange={e => setCaregiverId(e.target.value)} required>\n              {caregivers.map(c => (\n                <option key={c.id} value={c.id}>{c.name} ({c.role})</option>\n              ))}\n            </select>\n          </label>\n          <label className=\"form-row\">\n            <span>메모</span>\n            <textarea value={memo} onChange={e => setMemo(e.target.value)} rows={3} placeholder=\"준비물, 약 등\" />\n          </label>\n          <div className=\"modal-actions\">\n            <button type=\"button\" className=\"btn btn-secondary\" onClick={onClose}>취소</button>\n            <button type=\"submit\" className=\"btn btn-primary\">{isEdit ? '수정' : '등록'}</button>\n          </div>\n        </form>\n      </div>\n    </div>\n  );\n}\n\nReactDOM.createRoot(document.getElementById('root')).render(<App />);";
